{% extends 'base.html' %}
{% block title %}Загрузка заказа{% endblock %}
{% block content %}
<div class="card" style="max-width:720px; margin:0 auto;">
    <h1>Загрузка заказа из файла</h1>
    <p class="muted">Поддерживаются CSV, XLSX, XLSM. Ожидаются колонки <strong>Код</strong> и <strong>Количество</strong>.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Загрузить в корзину</button>
    </form>
</div>
{% endblock %}
